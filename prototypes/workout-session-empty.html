<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceFit — Workout Session (Empty)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FFFFFF; --surface: #F8F8F8; --border: #E8E8E8;
    --text-primary: #1A1A1A; --text-secondary: #8E8E93; --text-tertiary: #AEAEB2;
    --calories: #FF9500; --steps: #34C759; --weight: #007AFF; --workouts: #AF52DE;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: #E5E5E5; display: flex; justify-content: center; padding: 24px 0; min-height: 100vh;
  }
  .phone {
    width: 390px; height: 844px; background: var(--bg);
    border-radius: 40px; overflow: hidden; position: relative;
    box-shadow: 0 25px 80px rgba(0,0,0,0.15);
  }
  .status-bar {
    height: 54px; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 8px; font-size: 15px; font-weight: 600; color: var(--text-primary);
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; }

  /* Session Header */
  .session-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px 12px; border-bottom: 1px solid var(--border);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .session-title-area { text-align: center; flex: 1; }
  .session-name {
    font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px;
  }
  .session-date { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .finish-btn {
    padding: 8px 18px; border-radius: 999px; border: none;
    background: var(--border); color: var(--text-secondary);
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex; justify-content: space-around; padding: 12px 20px;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .stat-item { text-align: center; }
  .stat-val { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .stat-lbl { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 1px; }

  /* Screen */
  .screen {
    height: calc(100% - 54px - 60px - 46px - 83px);
    overflow-y: auto; padding: 16px 20px 24px;
    -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* Empty State */
  .empty-state { text-align: center; padding-bottom: 40px; }
  .empty-icon {
    width: 80px; height: 80px; border-radius: 999px;
    background: var(--surface); margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .empty-title {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.3px; margin-bottom: 8px;
  }
  .empty-desc {
    font-size: 15px; color: var(--text-secondary); line-height: 1.5;
    max-width: 260px; margin: 0 auto;
  }

  .add-exercise-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--text-primary); color: #FFFFFF;
    font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 16px;
  }

  .or-divider {
    display: flex; align-items: center; gap: 16px; width: 100%; padding: 0 0 16px;
  }
  .or-line { flex: 1; height: 1px; background: var(--border); }
  .or-text { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; }

  .voice-cta {
    width: 100%; padding: 14px; border-radius: 14px;
    border: 1.5px solid var(--border); background: transparent;
    font-size: 15px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .voice-cta-mic {
    width: 28px; height: 28px; border-radius: 999px; background: var(--text-primary);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* Command Center */
  .command-center {
    position: absolute; bottom: 83px; left: 12px; right: 12px;
    background: var(--bg); border-radius: 20px;
    padding: 8px 8px 8px 18px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.06), 0 0 0 1px var(--border); z-index: 10;
  }
  .cc-left { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
  .cc-sparkle { flex-shrink: 0; opacity: 0.4; }
  .cc-hint { font-size: 15px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cc-mic {
    width: 48px; height: 48px; border-radius: 999px; background: var(--text-primary);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    cursor: pointer; position: relative;
  }
  .cc-mic::before {
    content: ''; position: absolute; inset: -4px; border-radius: 999px;
    border: 2px solid rgba(26,26,26,0.08); animation: cc-pulse 2.5s ease-in-out infinite;
  }
  @keyframes cc-pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 0; }
  }

  /* Tab Bar */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 83px;
    background: var(--bg); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .tab-icon { width: 24px; height: 24px; }
  .tab-label { font-size: 10px; font-weight: 500; }
  .tab-item.active .tab-label { color: var(--text-primary); }
  .tab-item:not(.active) .tab-label { color: var(--text-secondary); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="right">
      <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="9" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/><rect x="13" y="0" width="3.5" height="12" rx="1" fill="#1A1A1A"/></svg>
      <svg width="16" height="12" fill="none"><path d="M8 2.4C10.6 2.4 12.9 3.4 14.6 5L16 3.5C13.9 1.3 11.1 0 8 0S2.1 1.3 0 3.5L1.4 5C3.1 3.4 5.4 2.4 8 2.4z" fill="#1A1A1A"/><path d="M8 6.8c1.7 0 3.2.7 4.3 1.8L13.7 7c-1.5-1.5-3.5-2.4-5.7-2.4S4.3 5.5 2.8 7l1.4 1.5C5.3 7.5 6.6 6.8 8 6.8z" fill="#1A1A1A"/><circle cx="8" cy="11" r="1.5" fill="#1A1A1A"/></svg>
      <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="3" stroke="#1A1A1A" stroke-width="1"/><rect x="23" y="4" width="2.5" height="4" rx="1" fill="#1A1A1A" opacity="0.4"/><rect x="2" y="3" width="15" height="6" rx="1.5" fill="#1A1A1A"/></svg>
    </div>
  </div>

  <!-- Session Header -->
  <div class="session-header">
    <div class="back-btn">
      <svg width="10" height="18" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1L1 9l8 8"/></svg>
    </div>
    <div class="session-title-area">
      <div class="session-name">Evening Session</div>
      <div class="session-date">Today &middot; 6:30 PM</div>
    </div>
    <button class="finish-btn">Finish</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-val">0:00</div>
      <div class="stat-lbl">Duration</div>
    </div>
    <div class="stat-item">
      <div class="stat-val">0 <span style="font-size:11px;font-weight:500;color:var(--text-secondary)">kg</span></div>
      <div class="stat-lbl">Volume</div>
    </div>
    <div class="stat-item">
      <div class="stat-val">0</div>
      <div class="stat-lbl">Sets</div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="screen">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="36" height="36" fill="none" stroke="#AEAEB2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="6" width="24" height="24" rx="4"/>
          <path d="M13 18h10"/>
          <path d="M13 13h6"/>
          <path d="M13 23h8"/>
        </svg>
      </div>
      <div class="empty-title">No exercises yet</div>
      <div class="empty-desc">Add your first exercise to get started, or just speak into the mic below.</div>
    </div>

    <button class="add-exercise-btn">
      <svg width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"><path d="M9 1v16M1 9h16"/></svg>
      Add Exercise
    </button>

    <div class="or-divider">
      <div class="or-line"></div>
      <span class="or-text">or</span>
      <div class="or-line"></div>
    </div>

    <button class="voice-cta">
      <div class="voice-cta-mic">
        <svg width="14" height="14" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="1" width="6" height="8" rx="3"/><path d="M2 7.5a5 5 0 0010 0"/><path d="M7 12v2"/></svg>
      </div>
      "Bench press 3 sets of 10 at 80 kg"
    </button>
  </div>

  <!-- Command Center -->
  <div class="command-center">
    <div class="cc-left">
      <svg class="cc-sparkle" width="16" height="16" fill="none" stroke="#AEAEB2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1v3M8 12v3M1 8h3M12 8h3M3 3l2 2M11 11l2 2M13 3l-2 2M5 11l-2 2"/></svg>
      <span class="cc-hint">"Did 3 sets of squats at 100kg..."</span>
    </div>
    <div class="cc-mic">
      <svg width="20" height="20" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="1" width="8" height="11" rx="4"/><path d="M3 10a7 7 0 0014 0"/><path d="M10 17v3"/></svg>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="1.8"><path d="M3 12.5l9-9 9 9M5 11v8a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-8"/></svg>
      <span class="tab-label">Home</span>
    </div>
    <div class="tab-item active">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="#1A1A1A"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 12h8M8 8h4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="tab-label">Workouts</span>
    </div>
    <div class="tab-item">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="1.8" stroke-linecap="round"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="tab-label">Settings</span>
    </div>
  </div>
</div>
</body>
</html>
