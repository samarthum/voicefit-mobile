<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceFit — Command Center (Expanded)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FFFFFF; --surface: #F8F8F8; --border: #E8E8E8;
    --text-primary: #1A1A1A; --text-secondary: #8E8E93; --text-tertiary: #AEAEB2;
    --calories: #FF9500; --steps: #34C759; --weight: #007AFF; --workouts: #AF52DE;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: #E5E5E5; display: flex; justify-content: center; padding: 24px 0; min-height: 100vh;
  }
  .phone {
    width: 390px; height: 844px; background: var(--bg);
    border-radius: 40px; overflow: hidden; position: relative;
    box-shadow: 0 25px 80px rgba(0,0,0,0.15);
  }
  .status-bar {
    height: 54px; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 8px; font-size: 15px; font-weight: 600; color: var(--text-primary);
    position: relative; z-index: 20;
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; }

  /* Dimmed background content */
  .screen {
    height: calc(100% - 54px - 83px); overflow-y: auto; padding: 0 20px 24px;
    -webkit-overflow-scrolling: touch;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* Overlay backdrop */
  .cc-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 15;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  /* Expanded Command Center */
  .cc-expanded {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    z-index: 20;
    padding: 0 20px 34px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
  }

  .cc-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 10px auto 16px;
  }

  .cc-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 20px;
  }
  .cc-title {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .cc-close {
    width: 32px; height: 32px; border-radius: 999px;
    background: var(--surface); display: flex;
    align-items: center; justify-content: center; cursor: pointer;
  }

  /* Text Input Area */
  .cc-input-area {
    position: relative; padding-bottom: 20px;
  }
  .cc-textarea {
    width: 100%; min-height: 100px; padding: 14px 16px;
    border: 1.5px solid var(--border); border-radius: 16px;
    font-size: 16px; color: var(--text-primary); background: var(--bg);
    font-family: inherit; resize: none; outline: none;
    line-height: 1.5;
  }
  .cc-textarea:focus {
    border-color: var(--text-secondary);
  }
  .cc-textarea::placeholder { color: var(--text-tertiary); }

  /* Bottom action row */
  .cc-actions {
    display: flex; align-items: center; justify-content: space-between;
  }
  .cc-actions-left {
    display: flex; align-items: center; gap: 12px;
  }
  .cc-action-btn {
    width: 40px; height: 40px; border-radius: 999px;
    background: var(--surface); display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; border: none;
  }

  .cc-mic-big {
    width: 56px; height: 56px; border-radius: 999px;
    background: var(--text-primary); display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; border: none;
    position: relative;
  }
  .cc-mic-big::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 999px;
    border: 2.5px solid rgba(26,26,26,0.08);
    animation: cc-pulse 2.5s ease-in-out infinite;
  }
  @keyframes cc-pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  .cc-send {
    width: 40px; height: 40px; border-radius: 999px;
    background: var(--text-primary); display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; border: none;
    opacity: 0.3;
  }

  /* Quick Add Section */
  .cc-section-label {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 0 10px;
  }
  .cc-quick-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .cc-quick-item:last-child { border-bottom: none; }
  .cc-quick-left { display: flex; align-items: center; gap: 10px; }
  .cc-quick-emoji {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface); display: flex;
    align-items: center; justify-content: center; font-size: 18px;
  }
  .cc-quick-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .cc-quick-detail { font-size: 12px; color: var(--text-secondary); }
  .cc-quick-add {
    width: 28px; height: 28px; border-radius: 999px;
    background: var(--surface); display: flex;
    align-items: center; justify-content: center; cursor: pointer;
  }

  /* Tab bar behind overlay (just for visual reference) */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 83px;
    background: var(--bg); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
    z-index: 1;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .tab-icon { width: 24px; height: 24px; }
  .tab-label { font-size: 10px; font-weight: 500; }
  .tab-item.active .tab-label { color: var(--text-primary); }
  .tab-item:not(.active) .tab-label { color: var(--text-secondary); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="right">
      <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="9" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/><rect x="13" y="0" width="3.5" height="12" rx="1" fill="#1A1A1A"/></svg>
      <svg width="16" height="12" fill="none"><path d="M8 2.4C10.6 2.4 12.9 3.4 14.6 5L16 3.5C13.9 1.3 11.1 0 8 0S2.1 1.3 0 3.5L1.4 5C3.1 3.4 5.4 2.4 8 2.4z" fill="#1A1A1A"/><path d="M8 6.8c1.7 0 3.2.7 4.3 1.8L13.7 7c-1.5-1.5-3.5-2.4-5.7-2.4S4.3 5.5 2.8 7l1.4 1.5C5.3 7.5 6.6 6.8 8 6.8z" fill="#1A1A1A"/><circle cx="8" cy="11" r="1.5" fill="#1A1A1A"/></svg>
      <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="3" stroke="#1A1A1A" stroke-width="1"/><rect x="23" y="4" width="2.5" height="4" rx="1" fill="#1A1A1A" opacity="0.4"/><rect x="2" y="3" width="15" height="6" rx="1.5" fill="#1A1A1A"/></svg>
    </div>
  </div>

  <!-- Dimmed background showing Home screen underneath -->
  <div class="screen" style="opacity: 0.3; pointer-events: none;">
    <div style="padding: 8px 0 16px;">
      <div style="font-size: 28px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px;">VoiceFit</div>
    </div>
    <div style="display: flex; gap: 4px; padding: 0 0 20px; justify-content: space-between;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;"><span style="font-size:13px;font-weight:500;color:var(--text-secondary)">S</span><span style="font-size:17px;font-weight:600;color:var(--text-primary)">2</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;"><span style="font-size:13px;font-weight:500;color:var(--text-secondary)">M</span><span style="font-size:17px;font-weight:600;color:var(--text-primary)">3</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;"><span style="font-size:13px;font-weight:500;color:var(--text-secondary)">T</span><span style="font-size:17px;font-weight:600;color:var(--text-primary)">4</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;"><span style="font-size:13px;font-weight:500;color:var(--text-secondary)">W</span><span style="font-size:17px;font-weight:600;color:var(--text-primary)">5</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;"><span style="font-size:13px;font-weight:500;color:var(--text-secondary)">T</span><span style="font-size:17px;font-weight:600;color:var(--text-primary)">6</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;background:var(--text-primary);"><span style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.6)">F</span><span style="font-size:17px;font-weight:600;color:#FFFFFF">7</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;width:44px;border-radius:12px;"><span style="font-size:13px;font-weight:500;color:var(--text-secondary)">S</span><span style="font-size:17px;font-weight:600;color:var(--text-primary)">8</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;padding:8px 0 24px;">
      <div style="position:relative;width:180px;height:180px;">
        <svg width="180" height="180" viewBox="0 0 180 180" style="transform:rotate(-90deg)">
          <circle cx="90" cy="90" r="80" fill="none" stroke="#F0F0F0" stroke-width="10"/>
          <circle cx="90" cy="90" r="80" fill="none" stroke="#FF9500" stroke-width="10" stroke-dasharray="502.65" stroke-dashoffset="150.8" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
          <div style="font-size:42px;font-weight:700;color:var(--text-primary);letter-spacing:-1.5px;line-height:1;">1,505</div>
          <div style="font-size:14px;color:var(--text-secondary);margin-top:4px;">calories left</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dark overlay -->
  <div class="cc-overlay"></div>

  <!-- Expanded Command Center Sheet -->
  <div class="cc-expanded">
    <div class="cc-handle"></div>

    <div class="cc-header">
      <span class="cc-title">Command Center</span>
      <div class="cc-close">
        <svg width="14" height="14" fill="none" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg>
      </div>
    </div>

    <!-- Text Input -->
    <div class="cc-input-area">
      <textarea class="cc-textarea" rows="3" placeholder='Try: "Had a chicken salad for lunch, about 450 calories" or "Just ran 5k in 25 minutes"'></textarea>
    </div>

    <!-- Action Row: keyboard, mic, send -->
    <div class="cc-actions">
      <div class="cc-actions-left">
        <button class="cc-action-btn" title="Keyboard">
          <svg width="18" height="18" fill="none" stroke="#8E8E93" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="16" height="11" rx="2"/><path d="M4 8h1M7.5 8h1M11 8h1M14 8h1M5 11h8"/></svg>
        </button>
      </div>
      <button class="cc-mic-big">
        <svg width="24" height="24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="1" width="10" height="13" rx="5"/><path d="M4 12a8 8 0 0016 0"/><path d="M12 21v3"/></svg>
      </button>
      <div class="cc-actions-left" style="justify-content: flex-end;">
        <button class="cc-send" title="Send">
          <svg width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-3 5 16-8L2 1l3 5M5 12l4 0"/></svg>
        </button>
      </div>
    </div>

    <!-- Quick Add -->
    <div class="cc-section-label">Quick Add</div>
    <div class="cc-quick-item">
      <div class="cc-quick-left">
        <div class="cc-quick-emoji">&#127859;</div>
        <div>
          <div class="cc-quick-name">Chicken Salad</div>
          <div class="cc-quick-detail">450 kcal &middot; Lunch</div>
        </div>
      </div>
      <div class="cc-quick-add">
        <svg width="12" height="12" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"><path d="M6 1v10M1 6h10"/></svg>
      </div>
    </div>
    <div class="cc-quick-item">
      <div class="cc-quick-left">
        <div class="cc-quick-emoji">&#129386;</div>
        <div>
          <div class="cc-quick-name">Overnight Oats</div>
          <div class="cc-quick-detail">320 kcal &middot; Breakfast</div>
        </div>
      </div>
      <div class="cc-quick-add">
        <svg width="12" height="12" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"><path d="M6 1v10M1 6h10"/></svg>
      </div>
    </div>
    <div class="cc-quick-item">
      <div class="cc-quick-left">
        <div class="cc-quick-emoji">&#127828;</div>
        <div>
          <div class="cc-quick-name">Protein Shake</div>
          <div class="cc-quick-detail">180 kcal &middot; Snack</div>
        </div>
      </div>
      <div class="cc-quick-add">
        <svg width="12" height="12" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"><path d="M6 1v10M1 6h10"/></svg>
      </div>
    </div>
  </div>

  <!-- Tab Bar (hidden behind overlay) -->
  <div class="tab-bar">
    <div class="tab-item active">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="#1A1A1A"><path d="M3 12.5l9-9 9 9M5 11v8a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-8"/></svg>
      <span class="tab-label">Home</span>
    </div>
    <div class="tab-item">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2z"/><path d="M8 12h8M8 8h4"/></svg>
      <span class="tab-label">Workouts</span>
    </div>
    <div class="tab-item">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="1.8" stroke-linecap="round"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="tab-label">Settings</span>
    </div>
  </div>
</div>
</body>
</html>
